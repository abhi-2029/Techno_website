version: '3.8'

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: card-techno-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: card-technocrats
    networks:
      - card-network

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: card-techno-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/card-technocrats
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      JWT_EXPIRE: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-info@cardtechnocrats.com}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@cardtechno.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
    networks:
      - card-network

  # Frontend (Production)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: card-techno-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - card-network

volumes:
  mongo-data:
    driver: local

networks:
  card-network:
    driver: bridge
